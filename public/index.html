<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MOKE CRM MVP</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f6f1;
      --surface: #fffdfa;
      --surface-2: #f1eee6;
      --line: #ded8ca;
      --text: #24211d;
      --muted: #6d675f;
      --soft: #837a70;
      --accent: #176b65;
      --accent-2: #c46d2d;
      --accent-3: #7b4f94;
      --ok: #157347;
      --warn: #b7791f;
      --danger: #b42318;
      --shadow: 0 18px 50px rgba(44, 38, 28, 0.08);
      --radius: 8px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.45;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
    }

    .sidebar {
      background: #28231f;
      color: #f7f1e5;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand {
      display: grid;
      gap: 4px;
      padding: 6px 8px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand-title {
      font-size: 19px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .brand-subtitle {
      color: rgba(247, 241, 229, 0.72);
      font-size: 12px;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav button {
      width: 100%;
      min-height: 40px;
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 10px;
      border-radius: var(--radius);
      color: rgba(247, 241, 229, 0.78);
      background: transparent;
      text-align: left;
      padding: 8px 10px;
      transition: background 0.16s, color 0.16s;
    }

    .nav button:hover,
    .nav button.active {
      background: rgba(255, 255, 255, 0.1);
      color: #fffdfa;
    }

    .nav .count {
      color: rgba(247, 241, 229, 0.54);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      color: currentColor;
    }

    .icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.9;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .content {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 72px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 16px 24px;
      background: rgba(247, 246, 241, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .page-title {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .page-kicker {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .main {
      padding: 22px 24px 30px;
      display: grid;
      gap: 18px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .searchbar {
      display: grid;
      grid-template-columns: 20px 1fr;
      gap: 8px;
      align-items: center;
      min-height: 40px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .searchbar input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }

    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset;
    }

    .btn:hover {
      border-color: #c8bdaa;
      background: #fffaf1;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn.primary:hover {
      background: #105b55;
    }

    .btn.danger {
      color: white;
      border-color: var(--danger);
      background: var(--danger);
    }

    .btn.icon-only {
      width: 38px;
      min-width: 38px;
      padding: 0;
    }

    .select,
    .input,
    .textarea {
      width: 100%;
      min-height: 40px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      padding: 8px 10px;
      outline: 0;
    }

    .textarea {
      min-height: 84px;
      resize: vertical;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.kpis {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .grid.two {
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      align-items: start;
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel,
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel {
      overflow: hidden;
    }

    .panel-head {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      display: grid;
      gap: 1px;
    }

    .panel-title strong {
      font-size: 15px;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body {
      padding: 16px;
    }

    .kpi {
      min-height: 118px;
      padding: 14px;
      display: grid;
      align-content: space-between;
      gap: 10px;
    }

    .kpi-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .kpi-value {
      font-size: 30px;
      line-height: 1;
      font-weight: 780;
      font-variant-numeric: tabular-nums;
    }

    .kpi-note {
      color: var(--soft);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .table-wrap {
      overflow: auto;
      max-width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #fbf8f1;
      color: var(--muted);
      font-size: 12px;
      z-index: 2;
      font-weight: 700;
    }

    td {
      font-size: 13px;
    }

    tr:hover td {
      background: #fcf8ef;
    }

    .row-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 650;
      background: var(--surface-2);
      color: #4c463f;
    }

    .pill.green {
      background: #e8f4ed;
      color: #146c43;
    }

    .pill.orange {
      background: #fff1df;
      color: #9a5a1f;
    }

    .pill.red {
      background: #fdebea;
      color: #b42318;
    }

    .pill.blue {
      background: #e7f2f2;
      color: #176b65;
    }

    .pill.purple {
      background: #f0e9f6;
      color: #694185;
    }

    .tag-list {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .bar-list {
      display: grid;
      gap: 10px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr) 64px;
      align-items: center;
      gap: 10px;
      min-height: 28px;
    }

    .bar-label {
      color: var(--text);
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .bar-track {
      height: 10px;
      background: #e8e1d4;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--accent);
    }

    .bar-value {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
      font-size: 12px;
    }

    .funnel {
      display: grid;
      gap: 8px;
    }

    .funnel-stage {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr) 76px;
      align-items: center;
      gap: 10px;
    }

    .stage-name {
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .stage-block {
      min-height: 26px;
      border-radius: 5px;
      background: #ddebe8;
      position: relative;
      overflow: hidden;
    }

    .stage-block::before {
      content: "";
      position: absolute;
      inset: 0;
      width: var(--w, 0%);
      background: linear-gradient(90deg, #176b65, #c46d2d);
    }

    .stage-count {
      font-size: 12px;
      color: var(--text);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .detail {
      display: grid;
      gap: 12px;
    }

    .detail-title {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-title h2 {
      margin: 0;
      font-size: 19px;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .meta-item {
      padding: 10px;
      background: #faf6ee;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-width: 0;
    }

    .meta-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
    }

    .meta-value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 650;
    }

    .tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      padding: 0 16px;
      background: #fbf8f1;
      overflow: auto;
    }

    .tab {
      min-height: 44px;
      background: transparent;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      padding: 0 10px;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-grid .full {
      grid-column: 1 / -1;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .split-control {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .empty {
      min-height: 180px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 36px));
      min-height: 46px;
      padding: 12px 14px;
      display: none;
      align-items: center;
      gap: 10px;
      border: 1px solid #b9ded6;
      background: #f0fbf8;
      color: #105b55;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      z-index: 80;
    }

    .toast.show {
      display: flex;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(22, 18, 14, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 60;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(860px, 100%);
      max-height: min(860px, calc(100vh - 36px));
      overflow: auto;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: 0 30px 90px rgba(20, 18, 15, 0.26);
    }

    .modal-head,
    .modal-foot {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbf8f1;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .modal-foot {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      bottom: 0;
      top: auto;
      justify-content: flex-end;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 760;
    }

    .modal-body {
      padding: 16px;
    }

    .profile-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbf8f1;
    }

    .profile-score {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
    }

    .ring {
      --p: 0%;
      width: 72px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--p), #e8e1d4 0);
      display: grid;
      place-items: center;
      color: var(--text);
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }

    .ring::before {
      content: "";
      position: absolute;
    }

    .flavor-radar {
      display: grid;
      gap: 8px;
    }

    .score-chip {
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr) 44px;
      align-items: center;
      gap: 8px;
    }

    .score-chip input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .import-box {
      display: grid;
      gap: 10px;
      border: 1px dashed #c8bdaa;
      background: #fbf8f1;
      border-radius: var(--radius);
      padding: 14px;
    }

    .code {
      font-family: var(--mono);
      font-size: 12px;
      color: #4f4741;
    }

    @media (max-width: 1180px) {
      .grid.kpis {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid.two,
      .grid.three {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        max-height: none;
      }

      .nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .topbar,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .top-actions,
      .filters {
        justify-content: stretch;
      }

      .top-actions .btn,
      .filters .btn,
      .filters .select {
        flex: 1;
      }

      .main {
        padding: 16px;
      }

      .grid.kpis {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-grid,
      .detail-meta {
        grid-template-columns: 1fr;
      }

      .bar-row,
      .funnel-stage {
        grid-template-columns: 110px minmax(0, 1fr) 54px;
      }
    }

    @media (max-width: 560px) {
      .grid.kpis {
        grid-template-columns: 1fr;
      }

      .nav {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">MOKE CRM</div>
        <div class="brand-subtitle">巧克力研发中心客户与风味反馈系统</div>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>
    <section class="content">
      <header class="topbar">
        <div class="page-title">
          <h1 id="pageTitle">Dashboard</h1>
          <div class="page-kicker" id="pageKicker">客户、样品、商机与风味反馈总览</div>
        </div>
        <div class="top-actions" id="topActions"></div>
      </header>
      <main class="main" id="app"></main>
    </section>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle"></div>
        <button class="btn icon-only" id="modalClose" title="关闭" aria-label="关闭"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./moke-crm-imported-data.js"></script>
  <script>
    const STORAGE_KEY = "moke-crm-mvp-v01";
    const IMPORTED_DATASET_MARKER_KEY = `${STORAGE_KEY}-imported-dataset`;
    const DATA_MODES = {
      small: "Small Demo",
      full: "Full Demo",
      custom: "Custom Local Data"
    };
    const today = new Date("2026-06-10T09:00:00+12:00");

    const enums = {
      customerType: ["Distributor", "Retailer", "Bakery", "Cafe", "Hotel", "Corporate Gift", "End Consumer", "Other"],
      customerStatus: ["Potential", "Active", "Converted", "Lost", "Dormant"],
      customerLevel: ["A", "B", "C"],
      decisionRole: ["Owner", "Buyer", "Product Manager", "R&D", "Store Manager", "Marketing", "Other"],
      productStatus: ["Concept", "Sample", "Testing", "Launched", "Discontinued"],
      flavorDimension: ["Texture", "Aroma", "Taste"],
      sampleStatus: ["Prepared", "Sent", "Received", "Tasted", "Feedback Received", "No Response"],
      opportunityStage: ["Lead", "Contacted", "Interested", "Sample Sent", "Testing", "Quoted", "Trial Order", "Regular Order", "Repeat Order", "Lost"],
      quoteStatus: ["Draft", "Sent", "Accepted", "Rejected", "Expired"],
      paymentStatus: ["Unpaid", "Partial", "Paid"],
      deliveryStatus: ["Not Shipped", "Shipped", "Delivered", "Completed"],
      interactionType: ["Email", "WeChat", "Phone", "Meeting", "Visit", "Sampling", "Other"],
      sweetnessFeedback: ["Too Low", "Slightly Low", "Just Right", "Slightly High", "Too High"],
      priceAcceptance: ["Too Expensive", "Acceptable", "Good Value", "Premium Acceptable"],
      syncStatus: ["not_synced", "synced", "failed"],
      currency: ["CNY", "NZD", "USD", "EUR"]
    };

    const navItems = [
      { id: "dashboard", label: "Dashboard", kicker: "客户、样品、商机与风味反馈总览", icon: "layout" },
      { id: "customers", label: "Customers", table: "customers", kicker: "客户资料、联系人、交易与口味画像", icon: "users" },
      { id: "contacts", label: "Contacts", table: "contacts", kicker: "联系人与决策角色", icon: "contact" },
      { id: "products", label: "Products", table: "products", kicker: "产品资料、风味画像与反馈表现", icon: "box" },
      { id: "flavor_tags", label: "Flavor Tags", table: "flavorTags", kicker: "Texture / Aroma / Taste 标签字典", icon: "tag" },
      { id: "product_flavor_scores", label: "Flavor Profiles", table: "productFlavorScores", kicker: "产品风味强度评分与类型生成", icon: "sliders" },
      { id: "samples", label: "Samples", table: "samples", kicker: "寄样、收样和待反馈提醒", icon: "send" },
      { id: "opportunities", label: "Opportunities", table: "opportunities", kicker: "商机阶段、预计金额与下一步动作", icon: "funnel" },

    function importedWorkbookState() {
      const imported = window.MOKE_CRM_IMPORTED_DATA;
      if (!imported || !imported.data || !imported.dataset_id) return null;
      if (localStorage.getItem(IMPORTED_DATASET_MARKER_KEY) === imported.dataset_id) return null;
      const importedData = structuredClone(imported.data);
      ensureStateShape(importedData);
      importedData.dataMode = DATA_MODES.full;
      importedData.customerTasteProfiles = buildTasteProfiles(importedData);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(importedData));
      localStorage.setItem(IMPORTED_DATASET_MARKER_KEY, imported.dataset_id);
      return importedData;
    }

    function ensureStateShape(data) {
      Object.keys(seed).forEach(key => {
        if (!Array.isArray(data[key])) data[key] = [];
      });
      if (!Array.isArray(data.importLogs)) data.importLogs = [];
      data.dataMode = data.dataMode || inferDataMode(data);
      return data;
    }

    function inferDataMode(data) {
      const imported = window.MOKE_CRM_IMPORTED_DATA?.data;
      if (imported && data.customers?.length === imported.customers?.length && data.products?.length === imported.products?.length) return DATA_MODES.full;
      if (data.customers?.length === seed.customers.length && data.products?.length === seed.products.length) return DATA_MODES.small;
      return DATA_MODES.custom;
    }

    function currentDataMode(data = state) {
      return data?.dataMode || inferDataMode(data || {});
    }

    function loadState() {
      const imported = importedWorkbookState();
      if (imported) return imported;
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        const seeded = structuredClone(seed);
        ensureStateShape(seeded);
        seeded.dataMode = DATA_MODES.small;
        seeded.customerTasteProfiles = buildTasteProfiles(seeded);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
        return seeded;
      }
      try {
        const parsed = JSON.parse(raw);
        ensureStateShape(parsed);
        parsed.customerTasteProfiles = buildTasteProfiles(parsed);
        return parsed;
      } catch {
        const seeded = structuredClone(seed);
        ensureStateShape(seeded);
        seeded.dataMode = DATA_MODES.small;
        seeded.customerTasteProfiles = buildTasteProfiles(seeded);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
        return seeded;
      }
    }

    function saveState(next = state, options = {}) {
      ensureStateShape(next);
      if (options.dataMode) next.dataMode = options.dataMode;
      next.customerTasteProfiles = buildTasteProfiles(next);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      state = next;
      updateProductTypes();
    }

    function persistStateWithoutTasteProfileRebuild(next = state, options = {}) {
      ensureStateShape(next);
      if (options.dataMode) next.dataMode = options.dataMode;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      state = next;
      updateProductTypes();
    }

    function updateProductTypes() {
      state.products.forEach(product => {
        product.generated_type = generateProductType(product.product_id);
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function buildTasteProfiles(data) {
      const profiles = data.customers.map(customer => {
        const feedbacks = data.customerFeedback.filter(f => f.customer_id === customer.customer_id);
        const likedFeedbacks = feedbacks.filter(f => Number(f.purchase_intent) >= 4 && Number(f.overall_liking) >= 4);
        const dislikedFeedbacks = feedbacks.filter(f => Number(f.overall_liking) <= 2);
        const preferredTags = new Set();
        const dislikedTags = new Set();
        likedFeedbacks.forEach(f => {
          primaryScores(data, f.product_id).forEach(s => preferredTags.add(s.tag_id));
          asArray(f.liked_tags).forEach(t => preferredTags.add(t));
        });
        dislikedFeedbacks.forEach(f => {
          primaryScores(data, f.product_id).forEach(s => dislikedTags.add(s.tag_id));
          asArray(f.disliked_tags).forEach(t => dislikedTags.add(t));
        });
        feedbacks.forEach(f => asArray(f.disliked_tags).forEach(t => dislikedTags.add(t)));

        const grouped = groupTagsByDimension(data, Array.from(preferredTags));
        const recommended = scoreProductsAgainstTags(data, Array.from(preferredTags), Array.from(dislikedTags), true);
        const notRecommended = scoreProductsAgainstTags(data, Array.from(preferredTags), Array.from(dislikedTags), false);
        const confidence = Math.min(95, Math.round((feedbacks.length / 5) * 70 + likedFeedbacks.length * 5));
        return baseRecord({
          profile_id: `CTP-${customer.customer_id.slice(-4)}`,
          customer_id: customer.customer_id,
          preferred_texture_tags: grouped.Texture,
          preferred_aroma_tags: grouped.Aroma,
          preferred_taste_tags: grouped.Taste,
          disliked_tags: Array.from(dislikedTags),
          recommended_products: recommended.slice(0, 3),
          not_recommended_products: notRecommended.slice(0, 2),
          confidence_score: Math.max(10, Math.min(confidence, 95)),
          last_updated: iso(today)
        });
      });
      return profiles;
    }

    function primaryScores(data, productId) {
      return data.productFlavorScores.filter(s => s.product_id === productId && Number(s.score) >= 4);
    }

    function groupTagsByDimension(data, tagIds) {
      const result = { Texture: [], Aroma: [], Taste: [] };
      tagIds.forEach(id => {
        const tag = data.flavorTags.find(t => t.tag_id === id);
        if (tag && result[tag.dimension]) result[tag.dimension].push(id);
      });
      return result;
    }

    function scoreProductsAgainstTags(data, preferredIds, dislikedIds, positive) {
      return data.products
        .map(product => {
          const scores = data.productFlavorScores.filter(s => s.product_id === product.product_id);
          const match = scores.reduce((sum, score) => {
            const id = score.tag_id;
            if (preferredIds.includes(id)) sum += Number(score.score);
            if (dislikedIds.includes(id)) sum -= Number(score.score) * 1.3;
            return sum;
          }, 0);
          return { id: product.product_id, match };
        })
        .filter(item => positive ? item.match > 0 : item.match < 0)
        .sort((a, b) => positive ? b.match - a.match : a.match - b.match)
        .map(item => item.id);
    }

    function asArray(value) {
      if (Array.isArray(value)) return value;
      if (value === undefined || value === null || value === "") return [];
      return String(value).split(/[;,，、]/).map(v => v.trim()).filter(Boolean);
    }

    function getMetrics() {
      const activeCustomers = state.customers.filter(c => ["Active", "Converted"].includes(c.status)).length;
      const samplesDue = state.samples.filter(isSampleDue).length;
      const openOpportunities = state.opportunities.filter(o => o.stage !== "Lost").length;
      const pipelineValue = state.opportunities.filter(o => o.stage !== "Lost").reduce((sum, o) => sum + Number(o.expected_value || 0), 0);
      const quotesSent = state.quotes.filter(q => ["Sent", "Accepted"].includes(q.quote_status)).length;
      const orderValue = state.orders.reduce((sum, o) => sum + Number(o.total_value || 0), 0);
      return {
        totalCustomers: state.customers.length,
        activeCustomers,
        newCustomersThisMonth: state.customers.filter(c => String(c.created_at || "").slice(0, 7) === "2026-06").length,
        samplesDue,
        openOpportunities,
        pipelineValue,
        quotesSent,
        orders: state.orders.length,
        orderValue
      };
    }

    function isSampleDue(sample) {
      if (sample.sample_status === "Feedback Received") return false;
      if (["Received", "Tasted"].includes(sample.sample_status)) return true;
      if (sample.sample_status === "Sent" && sample.sent_date) {
        return daysBetween(sample.sent_date, iso(today)) > 7;
      }
      return false;
    }

    function daysBetween(a, b) {
      return Math.floor((new Date(b) - new Date(a)) / 86400000);
    }

    function renderFunnel() {
      const stages = enums.opportunityStage.filter(s => s !== "Lost");
      const counts = stages.map(stage => state.opportunities.filter(o => o.stage === stage).length);
      const max = Math.max(1, ...counts);
      return `<div class="funnel">${stages.map((stage, i) => {
        const count = counts[i];
        const prev = i === 0 ? count : counts[i - 1] || 1;
        const conversion = i === 0 ? "100%" : `${Math.round((count / prev) * 100)}%`;
        return `<div class="funnel-stage">
          <div class="stage-name">${stage}</div>
          <div class="stage-block" style="--w:${Math.max(6, Math.round((count / max) * 100))}%"></div>
          <div class="stage-count">${count} / ${conversion}</div>
        </div>`;
      }).join("")}</div>`;
    }

      return renderBars(rows.map(row => ({

        width: row.score / max * 100,
        color: row.score >= 4 ? "var(--accent)" : "var(--accent-2)"
      })));

    function productFeedbackStats() {
      return state.products.map(product => {
        const feedbacks = state.customerFeedback.filter(f => f.product_id === product.product_id);
        const score = feedbacks.length
          ? feedbacks.reduce((sum, f) => sum + (Number(f.overall_liking || 0) + Number(f.purchase_intent || 0)) / 2, 0) / feedbacks.length
          : 0;
        return { product, score, count: feedbacks.length };
      }).sort((a, b) => b.score - a.score);
    }

    function renderFlavorTrend() {
      const counts = countTags(state.customerFeedback.flatMap(f => asArray(f.liked_tags)));
      const rows = Object.entries(counts)
        .map(([tagId, count]) => ({ label: tagName(tagId), value: count, width: count }))
        .sort((a, b) => b.value - a.value)
        .slice(0, 5);
      if (!rows.length) return `<div class="empty">暂无趋势</div>`;
      const max = Math.max(...rows.map(r => r.value), 1);
      return renderBars(rows.map(r => ({ ...r, width: r.value / max * 100, value: `${r.value} 次`, color: "var(--accent-3)" })));
    }

    function renderDistribution(table, key) {
      const counts = countBy(state[table], key);
      const rows = Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([label, count]) => ({ label, value: count }));
      if (!rows.length) return `<div class="empty">暂无数据</div>`;
      const max = Math.max(...rows.map(r => r.value), 1);
      return renderBars(rows.map(r => ({ label: r.label, value: `${r.value}`, width: r.value / max * 100, color: "var(--accent)" })));
    }

    function renderBars(rows) {
      return `<div class="bar-list">${rows.map(row => `<div class="bar-row">
        <div class="bar-label" title="${escapeHtml(row.label)}">${escapeHtml(row.label)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, row.width)}%;background:${row.color || "var(--accent)"}"></div></div>
        <div class="bar-value">${row.value}</div>
      </div>`).join("")}</div>`;
    }

    function renderTableView(table) {
      const meta = tableMeta[table];
      const rows = filteredRows(table);
      const app = document.getElementById("app");
      app.innerHTML = `
        <section class="toolbar">
          <div class="searchbar">${icon("search")}<input id="searchInput" placeholder="搜索 ${meta.title}" value="${escapeAttr(searchTerm)}" /></div>
          <div class="filters">${renderFilters(table)}</div>
        </section>
        <section class="grid two">
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title"><strong>${meta.title}</strong><span>${rows.length} 条记录</span></div>
            </div>
            <div class="table-wrap">${renderTable(table, rows)}</div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title"><strong>${meta.singular}详情</strong><span>${selectedId ? "关联数据与业务状态" : "选择一条记录查看"}</span></div>
            </div>
            <div class="panel-body">${renderDetail(table)}</div>
          </div>
        </section>
      `;
      document.getElementById("searchInput").addEventListener("input", event => {
        searchTerm = event.target.value;
        render();
      });
      document.querySelectorAll("[data-filter]").forEach(input => {
        input.addEventListener("change", event => {
          filters[event.target.dataset.filter] = event.target.value;
          render();
        });
      });
      document.querySelectorAll("[data-edit]").forEach(button => {
        button.addEventListener("click", () => openRecordModal(table, button.dataset.edit));
      });
      document.querySelectorAll("[data-delete]").forEach(button => {
        button.addEventListener("click", () => deleteRecord(table, button.dataset.delete));
      });
      document.querySelectorAll("[data-select]").forEach(row => {
        row.addEventListener("click", event => {
          if (event.target.closest("button")) return;
          selectedId = row.dataset.select;
          render();
        });
      });
      if (!selectedId && rows[0]) {
        selectedId = rows[0][meta.id];
        render();
      }
    }

    function renderFilters(table) {
      const filterKeys = filterFieldsFor(table);
      return filterKeys.map(key => {
        const options = uniqueValues(state[table], key);
        return `<select class="select" data-filter="${key}" aria-label="${key}">
          <option value="">全部 ${labelFor(table, key)}</option>
          ${options.map(value => `<option value="${escapeAttr(value)}" ${filters[key] === value ? "selected" : ""}>${escapeHtml(displayValue(table, key, value))}</option>`).join("")}
        </select>`;
      }).join("");
    }

    function filterFieldsFor(table) {
      if (table === "customers") return ["customer_type", "country", "customer_level", "owner", "status"];
      if (table === "products") return ["product_line", "product_status"];
      if (table === "flavorTags") return ["dimension"];
      if (table === "samples") return ["sample_status", "customer_id", "product_id"];
      if (table === "opportunities") return ["stage", "owner", "customer_id"];
      if (table === "quotes") return ["quote_status", "currency"];
      if (table === "orders") return ["payment_status", "delivery_status", "repeat_order_flag"];
      if (table === "customerFeedback") return ["product_id", "sweetness_feedback", "price_acceptance"];
      if (table === "customerTasteProfiles") return ["customer_id"];
      return [];
    }

    function filteredRows(table) {
      const meta = tableMeta[table];
      return state[table].filter(row => {
        const haystack = meta.search.map(key => displayValue(table, key, row[key])).join(" ").toLowerCase();
        const matchesSearch = !searchTerm || haystack.includes(searchTerm.toLowerCase());
        const matchesFilters = Object.entries(filters).every(([key, value]) => !value || String(row[key]) === value);
        return matchesSearch && matchesFilters;
      });
    }

    function renderTable(table, rows) {
      const meta = tableMeta[table];
      if (!rows.length) return `<div class="empty">暂无记录</div>`;
      return `<table>
        <thead><tr>
          ${meta.columns.map(([, label]) => `<th>${label}</th>`).join("")}
          <th style="text-align:right">操作</th>
        </tr></thead>
        <tbody>
          ${rows.map(row => `<tr data-select="${row[meta.id]}" style="${selectedId === row[meta.id] ? "outline:2px solid #9acdc3;outline-offset:-2px" : ""}">
            ${meta.columns.map(([key]) => `<td>${formatCell(table, key, row[key], row)}</td>`).join("")}
            <td>
              <div class="row-actions">
                <button class="btn icon-only" data-edit="${row[meta.id]}" title="编辑" aria-label="编辑">${icon("edit")}</button>
                <button class="btn icon-only" data-delete="${row[meta.id]}" title="删除" aria-label="删除">${icon("trash")}</button>
              </div>
            </td>
          </tr>`).join("")}
        </tbody>
      </table>`;
    }

    function renderDetail(table) {
      const meta = tableMeta[table];
      const row = selectedId ? state[table].find(item => item[meta.id] === selectedId) : null;
      if (!row) return `<div class="empty">暂无选中记录</div>`;
      if (table === "customers") return renderCustomerDetail(row);
      if (table === "products") return renderProductDetail(row);
      if (table === "customerTasteProfiles") return renderTasteProfileDetail(row);
      return renderGenericDetail(table, row);
    }

    function renderGenericDetail(table, row) {
      const meta = tableMeta[table];
      return `<div class="detail">
        <div class="detail-title">
          <h2>${escapeHtml(primaryName(table, row))}</h2>
          <span class="pill blue">${row[meta.id]}</span>
        </div>
        <div class="detail-meta">
          ${meta.columns.map(([key, label]) => `<div class="meta-item">
            <div class="meta-label">${label}</div>
            <div class="meta-value">${formatCell(table, key, row[key], row)}</div>
          </div>`).join("")}
          <div class="meta-item"><div class="meta-label">创建时间</div><div class="meta-value">${row.created_at || "-"}</div></div>
          <div class="meta-item"><div class="meta-label">更新时间</div><div class="meta-value">${row.updated_at || "-"}</div></div>
        </div>
      </div>`;
    }

    function renderCustomerDetail(customer) {
      const related = {
        contacts: state.contacts.filter(r => r.customer_id === customer.customer_id),
        opportunities: state.opportunities.filter(r => r.customer_id === customer.customer_id),
        samples: state.samples.filter(r => r.customer_id === customer.customer_id),
        quotes: state.quotes.filter(r => r.customer_id === customer.customer_id),
        orders: state.orders.filter(r => r.customer_id === customer.customer_id),
        interactions: state.interactions.filter(r => r.customer_id === customer.customer_id),
        feedback: state.customerFeedback.filter(r => r.customer_id === customer.customer_id),
        profile: state.customerTasteProfiles.find(r => r.customer_id === customer.customer_id)
      };
      return `<div class="detail">
        <div class="detail-title">
          <div><h2>${escapeHtml(customer.customer_name)}</h2><div class="tag-list">${pill(customer.customer_type, "blue")}${pill(customer.status, statusClass(customer.status))}${pill("Level " + customer.customer_level, "purple")}</div></div>
          <span class="pill">${customer.customer_id}</span>
        </div>
        <div class="detail-meta">
          ${metaItem("国家/城市", `${customer.country} / ${customer.city}`)}
          ${metaItem("来源", customer.source_channel)}
          ${metaItem("负责人", customer.owner)}
          ${metaItem("Tier0", customer.sync_status)}
        </div>
        <div class="tabs">
          ${["overview", "contacts", "opportunities", "samples", "quotes", "orders", "interactions", "feedback", "profile"].map(tab => `<button class="tab ${currentTab === tab ? "active" : ""}" data-tab="${tab}">${tabLabel(tab)}</button>`).join("")}
        </div>
        <div>${renderCustomerTab(customer, related)}</div>
      </div>`;
    }

    function renderCustomerTab(customer, related) {
      setTimeout(() => {
        document.querySelectorAll("[data-tab]").forEach(button => button.addEventListener("click", () => {
          currentTab = button.dataset.tab;
          render();
        }));
      });
      if (currentTab === "overview") {
        return `<div class="profile-card">
          <strong>客户备注</strong>
          <div>${escapeHtml(customer.notes || "-")}</div>
          <div class="grid three">
            ${miniStat("联系人", related.contacts.length)}
            ${miniStat("样品", related.samples.length)}
            ${miniStat("反馈", related.feedback.length)}
          </div>

      if (currentTab === "profile") return related.profile ? renderTasteProfileDetail(related.profile, false) : `<div class="empty">暂无画像</div>`;

        contacts: "contacts",
        opportunities: "opportunities",
        samples: "samples",
        quotes: "quotes",
        orders: "orders",
        interactions: "interactions",
        feedback: "customerFeedback"
      };
      return miniTable(tableMap[currentTab], related[currentTab] || []);

    function renderProductDetail(product) {
      const scores = state.productFlavorScores.filter(s => s.product_id === product.product_id).sort((a, b) => b.score - a.score);

      const stat = productFeedbackStats().find(s => s.product.product_id === product.product_id);
      return `<div class="detail">
        <div class="detail-title">
          <div><h2>${escapeHtml(product.product_name)}</h2><div class="tag-list">${pill(product.product_status, statusClass(product.product_status))}${pill(product.product_line, "blue")}${pill(product.cacao_percentage || "-", "purple")}</div></div>
          <span class="pill">${product.product_id}</span>
        </div>

          <strong>${escapeHtml(product.generated_type || generateProductType(product.product_id))}</strong>

    function renderFlavorScores(scores) {
      if (!scores.length) return `<div class="empty">暂无风味评分</div>`;
      return `<div class="flavor-radar">${scores.map(score => {
        const tag = state.flavorTags.find(t => t.tag_id === score.tag_id);
        const badge = score.is_primary_tag ? pill("主标签", "green") : score.is_secondary_tag ? pill("副标签", "orange") : "";
        return `<div class="bar-row">
          <div class="bar-label">${tag ? tag.tag_name_cn : score.tag_id} ${badge}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Number(score.score) / 5 * 100}%;background:${tagColor(tag && tag.dimension)}"></div></div>
          <div class="bar-value">${Number(score.score).toFixed(1)}</div>
        </div>`;
      }).join("")}</div>`;
    }

            <div>
              <strong>画像可信度</strong>

          </div>
        </div>
        <div class="detail-meta">
          ${metaItem("偏好口感", tagsDisplay(profile.preferred_texture_tags))}

        <tbody>${rows.map(row => `<tr>${columns.map(([key]) => `<td>${formatCell(table, key, row[key], row)}</td>`).join("")}</tr>`).join("")}</tbody>

    }

    function openRecordModal(table, id = null) {
      const meta = tableMeta[table];
      const existing = id ? state[table].find(row => row[meta.id] === id) : null;
      const record = existing ? structuredClone(existing) : defaultRecord(table);
      const title = `${existing ? "编辑" : "新增"}${meta.singular}`;
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalBody").innerHTML = `<form id="recordForm" class="form-grid">${meta.fields.map(f => renderField(table, f, record)).join("")}</form>`;
      document.getElementById("modalFoot").innerHTML = `
        <button class="btn" id="cancelModal">取消</button>
        <button class="btn primary" id="saveRecord">${icon("plus")}保存</button>
      `;
      document.getElementById("cancelModal").addEventListener("click", closeModal);
      document.getElementById("saveRecord").addEventListener("click", () => saveRecord(table, record, existing));
      if (table === "productFlavorScores") {
        const scoreInput = document.querySelector("[name='score']");
        const primaryInput = document.querySelector("[name='is_primary_tag']");
        const secondaryInput = document.querySelector("[name='is_secondary_tag']");
        scoreInput.addEventListener("input", () => {
          const score = Number(scoreInput.value || 0);
          primaryInput.checked = score >= 4;
          secondaryInput.checked = score >= 3 && score < 4;
        });
      }
      openModal();
    }

    function renderField(table, f, record) {
      const value = record[f.key];
      const required = f.required ? "required" : "";
      const full = ["textarea", "tagMulti", "relationMulti"].includes(f.type) || f.system ? " full" : "";
      if (f.type === "textarea") {
        return `<div class="field${full}"><label>${f.label}</label><textarea class="textarea" name="${f.key}" ${required}>${escapeHtml(value || "")}</textarea></div>`;
      }
      if (f.type === "select") {
        const options = enums[f.enumKey] || [];
        return `<div class="field${full}"><label>${f.label}</label><select class="select" name="${f.key}" ${required}>
          ${options.map(opt => `<option value="${escapeAttr(opt)}" ${String(value) === opt ? "selected" : ""}>${escapeHtml(opt)}</option>`).join("")}
        </select></div>`;
      }
      if (f.type === "relation") {
        return `<div class="field${full}"><label>${f.label}</label><select class="select" name="${f.key}" ${required}>
          <option value="">-</option>
          ${state[f.table].map(row => `<option value="${escapeAttr(row[tableMeta[f.table].id])}" ${String(value) === row[tableMeta[f.table].id] ? "selected" : ""}>${escapeHtml(row[f.labelKey] || row[tableMeta[f.table].id])}</option>`).join("")}
        </select></div>`;
      }
      if (f.type === "tagMulti") {
        return `<div class="field${full}"><label>${f.label}</label><select class="select" name="${f.key}" multiple size="5">
          ${state.flavorTags.map(tag => `<option value="${tag.tag_id}" ${asArray(value).includes(tag.tag_id) ? "selected" : ""}>${tag.tag_name_cn} · ${tag.dimension}</option>`).join("")}
        </select></div>`;
      }
      if (f.type === "relationMulti") {
        return `<div class="field${full}"><label>${f.label}</label><select class="select" name="${f.key}" multiple size="5">
          ${state[f.table].map(row => `<option value="${row[tableMeta[f.table].id]}" ${asArray(value).includes(row[tableMeta[f.table].id]) ? "selected" : ""}>${escapeHtml(row[f.labelKey] || row[tableMeta[f.table].id])}</option>`).join("")}
        </select></div>`;
      }
      if (f.type === "checkbox") {
        return `<div class="field${full}"><label>${f.label}</label><label class="btn" style="justify-content:flex-start"><input type="checkbox" name="${f.key}" ${value ? "checked" : ""} /> 是</label></div>`;
      }
      return `<div class="field${full}"><label>${f.label}</label><input class="input" name="${f.key}" type="${f.type}" value="${escapeAttr(value || "")}" ${required} /></div>`;
    }

    function saveRecord(table, originalRecord, existing) {
      const meta = tableMeta[table];
      const form = document.getElementById("recordForm");
      if (!form.reportValidity()) return;
      const record = structuredClone(originalRecord);
      meta.fields.forEach(f => {
        const input = form.elements[f.key];
        if (!input) return;
        if (f.type === "checkbox") record[f.key] = input.checked;
        else if (f.type === "number") record[f.key] = input.value === "" ? "" : Number(input.value);
        else if (f.type === "tagMulti" || f.type === "relationMulti") record[f.key] = Array.from(input.selectedOptions).map(opt => opt.value);
        else record[f.key] = input.value;
      });
      record.updated_at = iso(today);
      const tier0Action = existing ? "updated" : "created";
      if (existing) {
        state[table] = state[table].map(row => row[meta.id] === existing[meta.id] ? record : row);
      } else {
        record[meta.id] = nextId(table);
        record.created_at = iso(today);
        state[table].push(record);
      }
      if (table === "customerFeedback") {
        markSampleFeedbackReceived(record.sample_id);
      }
      saveState(state);
      toast(`${meta.singular}已保存`);
      closeModal();
      renderNav();
      renderTopActions();
      selectedId = record[meta.id];
      render();
      const tier0Event = buildTier0RecordEvent(table, record, tier0Action);
      if (tier0Event) sendTier0Event(tier0Event);
    }

    function defaultRecord(table) {
      const meta = tableMeta[table];
      const record = baseRecord({ [meta.id]: nextId(table) });
      meta.fields.forEach(f => {
        if (record[f.key] !== undefined) return;
        if (f.type === "checkbox") record[f.key] = false;
        else if (f.type === "tagMulti" || f.type === "relationMulti") record[f.key] = [];
        else if (f.type === "select") record[f.key] = (enums[f.enumKey] || [""])[0];
        else if (f.type === "date") record[f.key] = iso(today);
        else if (f.key === "source_system") record[f.key] = "MOKE_CRM";
        else if (f.key === "sync_status") record[f.key] = "not_synced";
        else record[f.key] = "";
      });
      if (table === "productFlavorScores") {
        record.score = 3;
        record.is_secondary_tag = true;
      }
      if (table === "customerFeedback") {
        record.overall_liking = 4;
        record.purchase_intent = 4;
      }
      return record;
    }

    function deleteRecord(table, id) {
      const meta = tableMeta[table];
      const row = state[table].find(item => item[meta.id] === id);
      if (!row) return;
      const ok = confirm(`删除 ${meta.singular}：${primaryName(table, row)}？`);
      if (!ok) return;
      state[table] = state[table].filter(item => item[meta.id] !== id);
      if (selectedId === id) selectedId = null;
      saveState(state);
      toast(`${meta.singular}已删除`);
      renderNav();
      render();
    }

    function nextId(table) {
      const meta = tableMeta[table];
      const prefixes = {
        customers: "CUS",
        contacts: "CON",
        products: "PRO",
        flavorTags: "TAG",
        productFlavorScores: "PFS",
        samples: "SAM",
        opportunities: "OPP",
        quotes: "QUO",
        orders: "ORD",
        interactions: "INT",
        customerFeedback: "FDB",
        customerTasteProfiles: "CTP"
      };
      const prefix = prefixes[table] || "REC";
      const nums = state[table].map(row => Number(String(row[meta.id] || "").split("-").pop())).filter(Number.isFinite);
      return makeId(prefix, (nums.length ? Math.max(...nums) : 0) + 1);
    }

    function markSampleFeedbackReceived(sampleId) {
      if (!sampleId) return;
      const sample = state.samples.find(s => s.sample_id === sampleId);
      if (sample) {
        sample.sample_status = "Feedback Received";
        sample.updated_at = iso(today);
      }
    }

    function generateProductType(productId) {
      const scores = state.productFlavorScores
        .filter(s => s.product_id === productId && Number(s.score) >= 2)
        .map(s => ({ ...s, tag: state.flavorTags.find(t => t.tag_id === s.tag_id) }))
        .filter(s => s.tag)
        .sort((a, b) => Number(b.score) - Number(a.score));
      const texture = scores.filter(s => s.tag.dimension === "Texture");
      const aroma = scores.filter(s => s.tag.dimension === "Aroma");
      const taste = scores.filter(s => s.tag.dimension === "Taste");
      const textureName = texture[0] ? texture[0].tag.tag_name_cn : "均衡口感";
      const aromaNames = aroma.slice(0, 2).map(s => s.tag.tag_name_cn.replace("香", "")).join("");
      const tasteText = tasteDescriptor(taste);
      return `${aromaNames || "可可"}${textureName} - ${aromaNames ? aromaNames + "香" : "可可香"} - ${tasteText}`;
    }

    function tasteDescriptor(tasteScores) {
      const get = cn => {
        const row = tasteScores.find(s => s.tag.tag_name_cn === cn);
        return row ? Number(row.score) : 0;
      };
      const sweet = get("甜度");
      const salty = get("咸度");
      const bitter = get("苦度");
      const acid = get("酸度");
      if (bitter >= 4) return "高苦长余味型";
      if (acid >= 3.5 && sweet >= 2.8) return "酸甜型";
      if (salty >= 1.5 && sweet >= 2.5) return "微咸微甜型";
      if (sweet >= 3.3) return "中甜型";
      if (sweet < 2.5) return "低甜型";
      return "均衡味觉型";
    }

    function productTypeOverride(productId) {
      const product = state.products.find(p => p.product_id === productId);
      return product && product.generated_type ? product.generated_type : generateProductType(productId);
    }

    function formatCell(table, key, value) {
      if (Array.isArray(value)) {
        if (key.includes("tags")) return `<div class="tag-list">${value.slice(0, 3).map(id => pill(tagName(id), "blue")).join("")}${value.length > 3 ? pill("+" + (value.length - 3), "") : ""}</div>`;
        if (key.includes("products")) return `<div class="tag-list">${value.slice(0, 2).map(id => pill(productName(id), "purple")).join("")}${value.length > 2 ? pill("+" + (value.length - 2), "") : ""}</div>`;
      }
      if (typeof value === "boolean") return value ? pill("是", "green") : pill("否", "");
      if (key.endsWith("_status") || key === "status" || key === "stage" || key === "quote_status" || key === "payment_status" || key === "delivery_status" || key === "product_status" || key === "sample_status") {
        return pill(value || "-", statusClass(value));
      }
      if (key === "customer_id") return escapeHtml(customerName(value));
      if (key === "product_id") return escapeHtml(productName(value));
      if (key === "contact_id") return escapeHtml(contactName(value));
      if (key === "sample_id") return escapeHtml(value || "-");
      if (key === "opportunity_id") return escapeHtml(value || "-");
      if (key === "quote_id") return escapeHtml(value || "-");
      if (key === "tag_id") return escapeHtml(tagName(value));
      if (key === "expected_value" || key === "total_value" || key === "unit_price") return formatMoney(value);
      if (key === "gross_margin" || key === "probability") return value === "" || value === undefined ? "-" : `${value}%`;
      if (key === "score") return Number(value || 0).toFixed(1);
      if (String(value || "").length > 42) return `<span title="${escapeAttr(value)}">${escapeHtml(String(value).slice(0, 42))}...</span>`;
      return escapeHtml(value === undefined || value === "" ? "-" : String(value));
    }

    function displayValue(table, key, value) {
      if (key === "customer_id") return customerName(value);
      if (key === "product_id") return productName(value);
      if (key === "contact_id") return contactName(value);
      if (key === "tag_id") return tagName(value);
      if (Array.isArray(value)) return value.map(v => tagName(v) || productName(v) || v).join(", ");
      return value === undefined || value === null || value === "" ? "-" : String(value);
    }

    function labelFor(table, key) {
      const meta = tableMeta[table];
      const col = meta.columns.find(([k]) => k === key);
      return col ? col[1] : key;
    }

    function primaryName(table, row) {
      if (!row) return "-";
      return row.customer_name || row.contact_name || row.product_name || row.tag_name_cn || row.feedback_id || row.sample_id || row.opportunity_id || row.quote_id || row.order_id || row.interaction_id || row.profile_id || row[tableMeta[table].id];
    }

    function customerName(id) {
      return (state.customers.find(c => c.customer_id === id) || {}).customer_name || id || "-";
    }

    function productName(id) {
      return (state.products.find(p => p.product_id === id) || {}).product_name || id || "-";
    }

    function contactName(id) {
      return (state.contacts.find(c => c.contact_id === id) || {}).contact_name || id || "-";
    }

    function tagName(id) {
      return (state.flavorTags.find(t => t.tag_id === id) || {}).tag_name_cn || id || "-";
    }

    function tagsDisplay(ids) {
      return asArray(ids).map(id => tagName(id)).join("、") || "-";
    }

    function productsDisplay(ids) {
      return asArray(ids).map(id => productName(id)).join("、") || "-";
    }

    function statusClass(value) {
      const v = String(value || "");
      if (["Active", "Converted", "Accepted", "Paid", "Delivered", "Completed", "Launched", "Repeat Order", "Regular Order", "Feedback Received"].includes(v)) return "green";
      if (["Potential", "Interested", "Testing", "Quoted", "Sent", "Sample Sent", "Trial Order", "Partial", "Received", "Tasted"].includes(v)) return "orange";
      if (["Lost", "Rejected", "Expired", "No Response", "Discontinued", "Too Expensive"].includes(v)) return "red";
      if (["Concept", "Sample", "Lead", "Contacted", "Draft", "Not Shipped", "Unpaid"].includes(v)) return "blue";
      return "";
    }

    function tagColor(dimension) {
      if (dimension === "Texture") return "var(--accent)";
      if (dimension === "Aroma") return "var(--accent-2)";
      if (dimension === "Taste") return "var(--accent-3)";
      return "var(--accent)";
    }

    function countBy(rows, key) {
      return rows.reduce((acc, row) => {
        const value = row[key] === undefined || row[key] === "" ? "-" : row[key];
        acc[value] = (acc[value] || 0) + 1;
        return acc;
      }, {});
    }

    function countTags(tagIds) {
      return tagIds.reduce((acc, id) => {
        if (!id) return acc;
        acc[id] = (acc[id] || 0) + 1;
        return acc;
      }, {});
    }

    function uniqueValues(rows, key) {
      return Array.from(new Set(rows.map(row => String(row[key])).filter(v => v && v !== "undefined"))).sort();
    }

    function metaItem(label, value) {
      return `<div class="meta-item"><div class="meta-label">${label}</div><div class="meta-value" title="${escapeAttr(value)}">${value}</div></div>`;
    }

    function pill(text, cls = "") {
      return `<span class="pill ${cls}">${escapeHtml(text === undefined || text === "" ? "-" : String(text))}</span>`;
    }

    function tabLabel(tab) {
      const map = {
        overview: "基本信息",
        contacts: "联系人",
        opportunities: "商机",
        samples: "样品",
        quotes: "报价",
        orders: "订单",
        interactions: "跟进",
        feedback: "反馈",
        profile: "口味画像"
      };
      return map[tab] || tab;
    }

    function formatMoney(value) {
      const n = Number(value || 0);
      if (!n) return "-";
      return new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 }).format(n);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    async function sendTier0Event(eventBody, successMessage = "Tier0 事件已发送") {
      try {
        const response = await fetch("/api/tier0", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(eventBody)
        });
        const responseText = await response.text();
        const result = {
          ok: response.ok,
          status: response.status,
          response: parseMaybeJson(responseText)
        };
        if (!response.ok) {
          toast(`Tier0 发送失败：${response.status}`);
          return result;
        }
        toast(successMessage);
        return result;
      } catch (error) {
        console.error("Tier0 传输失败", error);
        toast(`Tier0 发送失败：${error.message || error}`);
        return { ok: false, error: error.message || String(error) };
      }
    }

    function parseMaybeJson(text) {
      if (!text) return "";
      try {
        return JSON.parse(text);
      } catch {
        return text;
      }
    }

    function buildTier0RecordEvent(table, record, action) {
      const tier0Tables = {
        customers: {
          event: "customer",
          namespace: item => `MOKE/CRM/Customers/${item.customer_id}`
        },
        samples: {
          event: "sample",
          namespace: item => `MOKE/RD/Samples/${item.sample_id}`
        },
        products: {
          event: "recipe",
          namespace: item => `MOKE/RD/Recipes/${item.product_id}`
        },
        productFlavorScores: {
          event: "recipe_score",
          namespace: item => `MOKE/RD/Recipes/${item.product_id || "unknown"}/FlavorScores/${item.score_id}`
        },
        customerFeedback: {
          event: "feedback",
          namespace: item => `MOKE/CRM/Feedback/${item.feedback_id}`
        }
      };
      const config = tier0Tables[table];
      if (!config) return null;
      return {
        event: `${config.event}_${action}`,
        namespace: config.namespace(record),
        timestamp: new Date().toISOString(),
        payload: structuredClone(record)
      };
    }

    function toCsv(rows) {
      if (!rows.length) return "";
      const columns = Array.from(rows.reduce((set, row) => {
        Object.keys(row).forEach(key => set.add(key));
        return set;
      }, new Set()));
      const csvRows = [columns.join(",")];
      rows.forEach(row => {
        csvRows.push(columns.map(col => csvValue(row[col])).join(","));
      });
      return csvRows.join("\n");
    }

    function csvValue(value) {
      const raw = Array.isArray(value) ? value.join(";") : value ?? "";
      const str = String(raw);
      if (/[",\n]/.test(str)) return `"${str.replace(/"/g, '""')}"`;
      return str;
    }

    function download(filename, content) {
      const blob = new Blob(["\ufeff" + content], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }
