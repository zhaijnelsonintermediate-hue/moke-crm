                <td>${row.import_status === "need_review" ? `<input type="checkbox" data-review-row="${row.preview_id}" ${row.confirmed ? "checked" : ""} />` : row.import_status === "ready" ? "自动" : "-"}</td>
                <td>${escapeHtml(row.sheetName)}</td>
                <td>${escapeHtml(row.tableLabel)}</td>
                <td>${row.rowNumber}</td>
                <td>${pill(row.import_status, row.import_status === "ready" ? "green" : row.import_status === "need_review" ? "orange" : "red")}</td>
                <td>${escapeHtml(row.action)}</td>
                <td><span title="${escapeAttr(JSON.stringify(row.record))}">${escapeHtml(previewRecordLabel(row))}</span></td>
                <td>${(row.review_reasons || []).map(reason => pill(reason, "orange")).join("") || "-"}</td>
                <td>${renderMappedResult(row)}</td>
                <td>${row.errors.map(error => pill(error, "red")).join("") || "-"}</td>
                <td>${row.warnings.map(warning => pill(warning, "orange")).join("") || "-"}</td>
              </tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>`;
    }

    function renderImportLogs() {
      const logs = (state.importLogs || []).slice(-8).reverse();
      if (!logs.length) return `<div class="code">暂无日志</div>`;
      return `<div class="bar-list">${logs.map(log => `<div class="profile-card">
        <div class="detail-title">
          <div><strong>${escapeHtml(log.action || "import")}</strong><div class="code">${escapeHtml(log.file_name || "-")} · ${escapeHtml(log.batch_id || "-")}</div></div>
          ${pill(log.status || "-", log.status === "completed" ? "green" : log.status === "undone" ? "orange" : "red")}
        </div>
        <div class="code">${escapeHtml(log.row_count || 0)} rows · ${escapeHtml(log.message || "")} · ${escapeHtml(log.created_at || "")}</div>
      </div>`).join("")}</div>`;
    }

    function previewRecordLabel(row) {
      const record = row.record || {};
      const source = row.source || {};
      if (!record.customer_name && !source.customer_name) {
        const product = record.product_name || source.product_name || productName(record.product_id) || "-";
        return `Missing customer_name / product_name = ${product}`;
      }
      return record.customer_name || source.customer_name || record.contact_name || source.contact_name || record.product_name || source.product_name || record.feedback_id || record.sample_id || source.sample_id || record.opportunity_id || record.quote_id || record.order_id || record.interaction_id || record[tableMeta[row.table]?.id] || "-";
    }

    function renderMappedResult(row) {
      const record = row.record || {};
      const mapped = {
        customer_id: record.customer_id || "",
        product_id: record.product_id || "",
        overall_liking: record.overall_liking || "",
        purchase_intent: record.purchase_intent || "",
        liked_tags: asArray(record.liked_tags).map(tagName),
        disliked_tags: asArray(record.disliked_tags).map(tagName),
        negative_comment: record.negative_comment || "",
        warnings: row.warnings || []
      };
      return `<details><summary>查看</summary><pre class="code">${escapeHtml(JSON.stringify(mapped, null, 2))}</pre></details>`;
    }

    function updateImportPreviewUI() {
      const summary = document.getElementById("importPreviewSummary");
      const table = document.getElementById("importPreviewTable");
      if (summary) summary.innerHTML = renderImportPreviewSummary();
      if (table) table.innerHTML = renderImportPreviewTable();
      bindImportPreviewControls();
    }

    function bindImportPreviewControls() {
      document.querySelectorAll("[data-review-row]").forEach(input => {
        input.addEventListener("change", event => {
          const row = importWizardPreview?.rows.find(item => item.preview_id === event.target.dataset.reviewRow);
          if (row) row.confirmed = event.target.checked;
        });
      });
    }

    async function handleWizardAnalyze() {
      const input = document.getElementById("wizardFile");
      const file = input.files && input.files[0];
      if (!file) {
        toast("请选择 .xlsx 或 .csv 文件");
        return;
      }
      try {
        importWizardPreview = null;
        updateImportPreviewUI();
        toast("正在生成导入预览");
        const parseResult = await parseImportFile(file);
        const unknownCustomerMode = document.getElementById("unknownCustomerMode")?.value || "need_review";
        console.log("MOKE Import Wizard parse", {
          uploaded_file_name: parseResult.uploaded_file_name,
          parsed_header: parseResult.parsed_header,
          parsed_row_count: parseResult.parsed_row_count,
          first_row_preview: parseResult.first_row_preview,
          mapped_first_row_preview: parseResult.mapped_first_row_preview,
          unknown_customer_mode: unknownCustomerMode
        });
        importWizardPreview = buildImportPreview(parseResult, { unknownCustomerMode });
        updateImportPreviewUI();
        toast(`预览完成：${importWizardPreview.parsed_row_count} 行`);
      } catch (error) {
        console.error(error);
        importWizardPreview = buildParseErrorPreview(file.name, error);
        updateImportPreviewUI();
        toast(`解析失败：${error.message || error}`);
      }
    }

    function confirmAllReviewRows() {
      if (!importWizardPreview) {
        toast("请先生成预览");
        return;
      }
      importWizardPreview.rows.forEach(row => {
        if (row.import_status === "need_review") row.confirmed = true;
      });
      updateImportPreviewUI();
      toast("need_review 行已全部人工确认");
    }

    function commitWizardImport() {
      if (!importWizardPreview) {
        toast("请先生成预览");
        return;
      }
      const allowedRows = importWizardPreview.rows.filter(row => row.import_status === "ready" || (row.import_status === "need_review" && row.confirmed));
      if (!allowedRows.length) {
        toast("没有可导入行：请确认 need_review 或修正 error");
        return;
      }
      const rejectedReview = importWizardPreview.rows.filter(row => row.import_status === "need_review" && !row.confirmed).length;
      const batchId = `IMP-${Date.now()}`;
      const snapshot = structuredClone(state);
      const undoPayload = {
        batch_id: batchId,
        file_name: importWizardPreview.fileName,
        row_count: allowedRows.length,
        snapshot
      };
      localStorage.setItem(IMPORT_UNDO_KEY, JSON.stringify(undoPayload));

      const tableCounts = {};
      const createdCustomersByName = new Map();
      let skippedUnknownCustomers = 0;
      let importedRows = 0;
      allowedRows.forEach(row => {
        const meta = tableMeta[row.table];
        if (!meta) return;
        const record = structuredClone(row.record);
        if (row.table === "customerFeedback" && record.pending_customer_name && !record.customer_id) {
          if (record.unknown_customer_mode === "create_as_potential" || importWizardPreview.options?.unknownCustomerMode === "create_as_potential") {
            record.customer_id = ensurePotentialCustomerFromImport(record.pending_customer_name, record.owner, createdCustomersByName);
          } else {
            skippedUnknownCustomers += 1;
            return;
          }
        }
        if (row.table === "customerFeedback") {
          delete record.pending_customer_name;
          delete record.unknown_customer_mode;
          delete record.customer_name;
        }
        if (!record[meta.id]) record[meta.id] = nextId(row.table);
        record.source_system = record.source_system || "MOKE_CRM";
        record.sync_status = record.sync_status || "not_synced";
        record.external_id = record.external_id || "";
        record.updated_at = iso(today);
        if (!record.created_at) record.created_at = iso(today);
        const index = state[row.table].findIndex(item => item[meta.id] === record[meta.id]);
        if (index >= 0) {
          state[row.table][index] = { ...state[row.table][index], ...record };
          row.action = "update";
        } else {
          state[row.table].push(record);
          row.action = "insert";
        }
        if (row.table === "customerFeedback") markSampleFeedbackReceived(record.sample_id);
        tableCounts[row.table] = (tableCounts[row.table] || 0) + 1;
        importedRows += 1;
      });

      undoPayload.row_count = importedRows;
      localStorage.setItem(IMPORT_UNDO_KEY, JSON.stringify(undoPayload));

      state.importLogs.push(baseRecord({
        log_id: `LOG-${String((state.importLogs.length || 0) + 1).padStart(4, "0")}`,
        batch_id: batchId,
        action: "import",
        file_name: importWizardPreview.fileName,
        row_count: importedRows,
        status: "completed",
        message: `导入 ${importedRows} 行；跳过 ${rejectedReview} 行未确认 need_review；error ${importWizardPreview.stats.error} 行；${Object.entries(tableCounts).map(([table, count]) => `${table}:${count}`).join(", ")}`
      }));

      if (skippedUnknownCustomers) {
        state.importLogs[state.importLogs.length - 1].message += `；未知客户未导入 ${skippedUnknownCustomers} 行`;
      }
      saveState(state, { dataMode: DATA_MODES.custom });
      importWizardPreview = null;
      renderNav();
      renderTopActions();
      render();
      toast(`导入完成：${importedRows} 行`);
    }

    function ensurePotentialCustomerFromImport(name, owner, createdCustomersByName) {
      const normalized = normalizeName(name);
      const existing = state.customers.find(customer => normalizeName(customer.customer_name) === normalized);
      if (existing) return existing.customer_id;
      if (createdCustomersByName.has(normalized)) return createdCustomersByName.get(normalized);
      const customer = baseRecord({
        customer_id: nextId("customers"),
        customer_name: name,
        customer_type: "Other",
        country: "",
        city: "",
        source_channel: "Import Wizard",
        customer_level: "C",
        status: "Potential",
        owner: owner || "",
        notes: "Created from Customer Feedback import",
        source_system: "MOKE_CRM",
        sync_status: "not_synced",
        external_id: ""
      });
      state.customers.push(customer);
      createdCustomersByName.set(normalized, customer.customer_id);
      return customer.customer_id;
    }

    function readLastImportUndo() {
      try {
        return JSON.parse(localStorage.getItem(IMPORT_UNDO_KEY) || "null");
      } catch {
        return null;
      }
    }

    function undoLastImport() {
      const undo = readLastImportUndo();
      if (!undo || !undo.snapshot) {
        toast("暂无可撤回导入");
        return;
      }
      if (!confirm(`撤回最近一次导入：${undo.file_name}，${undo.row_count} 行？`)) return;
      const restored = ensureStateShape(undo.snapshot);
      restored.importLogs.push(baseRecord({
        log_id: `LOG-${String((restored.importLogs.length || 0) + 1).padStart(4, "0")}`,
        batch_id: undo.batch_id,
        action: "undo",
        file_name: undo.file_name,
        row_count: undo.row_count,
        status: "undone",
        message: "已撤回最近一次导入，恢复导入前数据快照"
      }));
      localStorage.removeItem(IMPORT_UNDO_KEY);
      saveState(restored);
      importWizardPreview = null;
      renderNav();
      renderTopActions();
      render();
      toast("最近一次导入已撤回");
    }

    async function parseImportFile(file) {
      const name = file.name.toLowerCase();
      if (name.endsWith(".csv")) {
        const text = await file.text();
        const parsed = parseCsvWithMeta(text);
        if (!parsed.rows.length) throw new Error("parse_error: uploaded_file parsedRows is empty");
        return makeParseResult(file.name, [{ sheetName: file.name.replace(/\.[^.]+$/, ""), rows: parsed.rows, parsed_header: parsed.headers }]);
      }
      if (name.endsWith(".xlsx")) {
        const sheets = await parseXlsxFile(await file.arrayBuffer());
        const parsedRowCount = sheets.reduce((sum, sheet) => sum + sheet.rows.length, 0);
        if (!parsedRowCount) throw new Error("parse_error: uploaded_file parsedRows is empty");
        return makeParseResult(file.name, sheets);
      }
      throw new Error("仅支持 .xlsx 和 .csv");
    }

    function makeParseResult(fileName, sheets) {
      const uploadedSheets = sheets.map(sheet => ({
        sheetName: sheet.sheetName,
        rows: Array.isArray(sheet.rows) ? sheet.rows : [],
        parsed_header: sheet.parsed_header || Object.keys((sheet.rows || [])[0] || {}),
        source_of_rows: "uploaded_file"
      }));
      const firstSheetWithRows = uploadedSheets.find(sheet => sheet.rows.length) || uploadedSheets[0] || { rows: [], parsed_header: [] };
      const firstRow = firstSheetWithRows.rows[0] || null;
      const mappedFirstRow = firstRow ? mapFields(firstRow, fieldAliases) : null;
      return {
        uploaded_file_name: fileName,
        source_of_preview_rows: "uploaded_file",
        parsed_header: firstSheetWithRows.parsed_header || [],
        parsed_row_count: uploadedSheets.reduce((sum, sheet) => sum + sheet.rows.length, 0),
        first_row_preview: firstRow,
        mapped_first_row_preview: mappedFirstRow,
        sheets: uploadedSheets
      };
    }

    function buildParseErrorPreview(fileName, error) {
      return {
        fileName,
        uploaded_file_name: fileName,
        source_of_preview_rows: "uploaded_file",
        parsed_header: [],
        parsed_row_count: 0,
        first_row_preview: null,
        mapped_first_row_preview: null,
        detected_table: "-",
        parse_error: error.message || String(error),
        sheets: [],
        rows: [],
        stats: { ready: 0, need_review: 0, error: 0, ignored: 0 }
      };
    }

    function buildImportPreview(parseResult, options = {}) {
      const previewOptions = {
        unknownCustomerMode: options.unknownCustomerMode || "need_review",
        allowCreateProducts: Boolean(options.allowCreateProducts)
      };
      const recognized = parseResult.sheets.map(sheet => {
        const parsedRows = Array.isArray(sheet.rows) ? sheet.rows : [];
        const detection = detectImportSheet(sheet.sheetName, parsedRows);
        return {
          ...sheet,
          detection,
          table: detection.table,
          tableLabel: detection.conflict ? "file_type_conflict" : detection.table ? tableNameForPreview(detection.table) : "ignored",
          file_type_conflict: detection.conflictMessage
        };
      });
      const context = buildImportContext(recognized);
      const rows = [];
      recognized.forEach(sheet => {
        if (sheet.detection?.conflict) {
          const parsedRows = Array.isArray(sheet.rows) ? sheet.rows : [];
          parsedRows.filter(row => Object.values(row).some(value => String(value || "").trim())).forEach((raw, index) => {
            rows.push(buildConflictPreviewRow(sheet, raw, index + 2));
          });
          return;
        }
        if (!sheet.table || !importTables.includes(sheet.table)) return;
        const parsedRows = Array.isArray(sheet.rows) ? sheet.rows : [];
        parsedRows.filter(row => Object.values(row).some(value => String(value || "").trim())).forEach((raw, index) => {
          rows.push(normalizeImportRow(sheet.table, raw, context, sheet.sheetName, index + 2, previewOptions));
        });
      });
      const stats = rows.reduce((acc, row) => {
        acc[row.import_status] += 1;
        return acc;
      }, { ready: 0, need_review: 0, error: 0, ignored: recognized.filter(s => !s.table || !importTables.includes(s.table)).length });
      const detectedTables = Array.from(new Set(recognized.filter(s => s.table).map(s => s.tableLabel)));
      const conflicts = recognized.filter(s => s.detection?.conflict);
      const dependencyCheck = buildDependencyCheck(recognized, context);
      return {
        fileName: parseResult.uploaded_file_name,
        uploaded_file_name: parseResult.uploaded_file_name,
        options: previewOptions,
        unknown_customer_mode: previewOptions.unknownCustomerMode,
        source_of_preview_rows: "uploaded_file",
        parsed_header: parseResult.parsed_header,
        parsed_row_count: parseResult.parsed_row_count,
        first_row_preview: parseResult.first_row_preview,
        mapped_first_row_preview: mappedPreviewForDebug(rows[0]) || parseResult.mapped_first_row_preview,
        detected_table: conflicts.length ? "file_type_conflict" : detectedTables.join(", ") || "-",
        name_detected_table: Array.from(new Set(recognized.map(s => s.detection?.nameTable).filter(Boolean).map(tableNameForPreview))).join(", "),
        header_detected_table: Array.from(new Set(recognized.map(s => s.detection?.headerTable).filter(Boolean).map(tableNameForPreview))).join(", "),
        file_type_conflict: conflicts.map(s => s.file_type_conflict).filter(Boolean).join(" · "),
        dependency_check: dependencyCheck,
        dependency_warning: dependencyCheck.warning,
        sheets: recognized,
        rows,
        stats
      };
    }

    function buildDependencyCheck(recognized) {
      const feedbackRows = recognized
        .filter(sheet => sheet.table === "customerFeedback" && !sheet.detection?.conflict)
        .flatMap(sheet => (Array.isArray(sheet.rows) ? sheet.rows : []).filter(row => Object.values(row).some(value => String(value || "").trim())));
      const mappedRows = feedbackRows.map(row => canonicalizeRow(row));
      const customerMatched = mappedRows.filter(row => ["matched", "review"].includes(matchCustomer(row, state.customers).status)).length;
      const productMatched = mappedRows.filter(row => ["matched", "review"].includes(matchProduct(row, state.products).status)).length;
      const total = mappedRows.length;
      const customerMatchRate = total ? Math.round((customerMatched / total) * 100) : 100;
      const productMatchRate = total ? Math.round((productMatched / total) * 100) : 100;
      return {
        current_customer_count: state.customers.length,
        current_product_count: state.products.length,
        current_flavor_tag_count: state.flavorTags.length,
        current_data_mode: currentDataMode(state),
        customer_match_rate: customerMatchRate,
        product_match_rate: productMatchRate,
        warning: total && customerMatchRate < 50 ? "当前反馈文件中的客户大部分不在 CRM 中。请先导入 Customers，或切换到允许创建新客户模式。" : ""
      };
    }

    function mappedPreviewForDebug(row) {
      if (!row) return null;
      const record = row.record || row.source || {};
      const keys = ["customer_name", "customer_id", "product_name", "product_id", "sample_id", "tasting_date", "overall_liking", "purchase_intent", "liked_tags", "disliked_tags", "sweetness_feedback", "price_acceptance", "comment", "owner"];
      return keys.reduce((acc, key) => {
        const value = record[key] !== undefined ? record[key] : row.source && row.source[key];
        if (value !== undefined && value !== "") acc[key] = value;
        return acc;
      }, {});
    }

    function buildConflictPreviewRow(sheet, raw, rowNumber) {
      return {
        preview_id: `conflict-${sheet.sheetName}-${rowNumber}-${Math.random().toString(36).slice(2, 7)}`,
        sheetName: sheet.sheetName,
        table: sheet.detection?.headerTable || sheet.detection?.nameTable || "",
        tableLabel: "file_type_conflict",
        rowNumber,
        source: canonicalizeRow(raw),
        record: canonicalizeRow(raw),
        action: "blocked",
        import_status: "error",
        errors: [sheet.file_type_conflict || "file_type_conflict"],
        warnings: [],
        confirmed: false
      };
    }

    function tableNameForPreview(table) {
      const map = {
        customers: "Customers",
        contacts: "Contacts",
        products: "Products",
        samples: "Samples",
        opportunities: "Opportunities",
        quotes: "Quotes",
        orders: "Orders",
        interactions: "Interactions",
        customerFeedback: "Customer_Feedback"
      };
      return map[table] || table;
    }

    function detectImportSheet(sheetName, rows) {
      const nameTable = detectTableFromName(sheetName);
      const headerDetection = detectTableFromHeaders(rows);
      const headerTable = headerDetection.table;
      const headerScore = headerDetection.score;
      if (nameTable && headerTable && nameTable !== headerTable && headerScore >= 2) {
        return {
          table: null,
          nameTable,
          headerTable,
          headerScore,
          conflict: true,
          conflictMessage: `file_type_conflict: 文件名像 ${tableNameForPreview(nameTable)}，但表头像 ${tableNameForPreview(headerTable)}。`
        };
      }
      return {
        table: nameTable || headerTable,
        nameTable,
        headerTable,
        headerScore,
        conflict: false,
        conflictMessage: ""
      };
    }

    function detectImportTable(sheetName, rows) {
      return detectImportSheet(sheetName, rows).table;
    }

    function detectTableFromName(sheetName) {
      const normalizedName = normalizeImportKey(sheetName.replace(/\.[^.]+$/, ""));
      for (const [table, aliases] of Object.entries(sheetAliases)) {
        if (aliases.map(normalizeImportKey).includes(normalizedName)) return table;
      }
      return null;
    }

    function detectTableFromHeaders(rows) {
      const headers = rows[0] ? Object.keys(rows[0]).map(header => canonicalFieldName(header)) : [];
      const score = Object.entries(importFieldSets()).map(([table, fields]) => ({
        table,
        score: fields.filter(field => headers.includes(field)).length
      })).sort((a, b) => b.score - a.score)[0];
      return score && score.score >= 2 ? score : { table: null, score: score ? score.score : 0 };
    }

    function importFieldSets() {
      return {
        customers: ["customer_id", "customer_name", "customer_type", "country", "city"],
        contacts: ["contact_id", "customer_id", "contact_name", "decision_role"],
        products: ["product_id", "product_name", "sku", "product_line"],
        samples: ["sample_id", "customer_id", "product_id", "sample_status"],
        opportunities: ["opportunity_id", "customer_id", "stage", "expected_value"],
        quotes: ["quote_id", "customer_id", "product_id", "quote_status"],
        orders: ["order_id", "customer_id", "product_id", "total_value"],
        interactions: ["interaction_id", "customer_id", "interaction_type", "content"],
        customerFeedback: ["feedback_id", "customer_id", "product_id", "overall_liking", "purchase_intent"]
      };
    }

    function buildImportContext(sheets) {
      const rawByTable = table => sheets.filter(s => s.table === table).flatMap(s => s.rows.map(row => canonicalizeRow(row)));
      const prospectiveCustomers = [
        ...state.customers,
        ...rawByTable("customers").map(row => ({ customer_id: cellText(row.customer_id), customer_name: cellText(row.customer_name) })).filter(row => row.customer_id || row.customer_name)
      ];
      const prospectiveProducts = [
        ...state.products,
        ...rawByTable("products").map(row => ({
          product_id: cellText(row.product_id),
          product_name: cellText(row.product_name),
          sku: cellText(row.sku),
          product_alias: cellText(row.product_alias)
        })).filter(row => row.product_id || row.product_name || row.sku)
      ];
      const prospectiveTags = [...state.flavorTags];
      return {
        customers: prospectiveCustomers,
        products: prospectiveProducts,
        tags: prospectiveTags,
        contacts: [...state.contacts, ...rawByTable("contacts")],
        samples: [...state.samples, ...rawByTable("samples")],
        opportunities: [...state.opportunities, ...rawByTable("opportunities")],
        quotes: [...state.quotes, ...rawByTable("quotes")]
      };
    }

    function normalizeImportRow(table, raw, context, sheetName, rowNumber, options = {}) {
      const source = canonicalizeRow(raw);
      const errors = [];
      const warnings = [];
      const record = normalizeRecordByTable(table, source, context, errors, warnings, options);
      const meta = tableMeta[table];
      if (meta && !record[meta.id]) record[meta.id] = nextImportId(table, rowNumber);
      record.source_system = record.source_system || "MOKE_CRM";
      record.sync_status = record.sync_status || "not_synced";
      record.external_id = record.external_id || "";
      record.created_at = normalizeDateValue(record.created_at) || iso(today);
      record.updated_at = normalizeDateValue(record.updated_at) || iso(today);
      const action = meta && state[table].some(item => item[meta.id] === record[meta.id]) ? "update" : "insert";
      const review_reasons = reviewReasonsFor(warnings);
      const import_status = importStatusFor(errors, warnings);
      return {
        preview_id: `${table}-${sheetName}-${rowNumber}-${Math.random().toString(36).slice(2, 7)}`,
        sheetName,
        table,
        tableLabel: tableNameForPreview(table),
        rowNumber,
        source,
        record,
        action,
        import_status,
        errors,
        warnings,
        review_reasons,
        confirmed: false
      };
    }

    function importStatusFor(errors, warnings) {
      if (errors.length) return "error";
      return warnings.some(w => ["product_alias_match", "fuzzy_product_match", "non_flavor_negative_comment", "natural_language_rating", "liked_tags_unknown", "unknown_customer_need_review", "unknown_customer_create_as_potential", "模糊", "人工确认", "未能识别", "未知风味", "需要复核"].some(token => w.includes(token))) ? "need_review" : "ready";
    }

    function reviewReasonsFor(warnings) {
      const joined = warnings.join(" ");
      const reasons = [];
      if (joined.includes("product_alias_match")) reasons.push("product_alias_match");
      if (joined.includes("fuzzy_product_match")) reasons.push("fuzzy_product_match");
      if (joined.includes("non_flavor_negative_comment")) reasons.push("non_flavor_negative_comment");
      if (joined.includes("natural_language_rating")) reasons.push("natural_language_rating");
      if (joined.includes("liked_tags_unknown")) reasons.push("unknown_liked_tag");
      if (joined.includes("unknown_customer_need_review")) reasons.push("unknown_customer_need_review");
      if (joined.includes("unknown_customer_create_as_potential")) reasons.push("unknown_customer_create_as_potential");
      return reasons;
    }

    function normalizeRecordByTable(table, row, context, errors, warnings, options = {}) {
      const record = {};
      Object.entries(row).forEach(([key, value]) => {
        if (value !== "") record[key] = value;
      });
      if (table === "customers") {
        required(record, "customer_name", errors, "缺少客户名称");
        record.customer_type = enumValue(record.customer_type, "customerType", "Other", warnings);
        record.customer_level = enumValue(record.customer_level, "customerLevel", "C", warnings);
        record.status = enumValue(record.status, "customerStatus", "Potential", warnings);
      }
      if (table === "products") {
        required(record, "product_name", errors, "缺少产品名称");
        record.product_status = enumValue(record.product_status, "productStatus", "Testing", warnings);
        if (record.cacao_percentage && !String(record.cacao_percentage).includes("%")) record.cacao_percentage = `${record.cacao_percentage}%`;
      }
      if (table === "contacts") {
        record.customer_id = resolveCustomer(row, context, errors, warnings, options);
        required(record, "contact_name", errors, "缺少联系人姓名");
        record.decision_role = enumValue(record.decision_role, "decisionRole", "Other", warnings);
        record.is_primary_contact = boolValue(record.is_primary_contact);
      }
      if (table === "samples") {
        record.customer_id = resolveCustomer(row, context, errors, warnings, options);
        record.product_id = resolveProduct(row, context, errors, warnings);
        record.contact_id = resolveContact(row.contact_id, context, warnings) || record.contact_id || "";
        record.sample_quantity = numberValue(record.sample_quantity, "");
        record.sample_status = enumValue(record.sample_status, "sampleStatus", "Sent", warnings);
      }
      if (table === "opportunities") {
        record.customer_id = resolveCustomer(row, context, errors, warnings, options);
        const product = resolveProductLoose(row.product_interest || row.product_name || row.product_id || row.sku, context, warnings);
        record.product_interest = product.value || cellText(row.product_interest || row.product_name);
        record.stage = enumValue(record.stage, "opportunityStage", "Lead", warnings);
        record.expected_value = numberValue(record.expected_value, 0);
        record.probability = numberValue(record.probability, 0);
      }
      if (table === "quotes") {
        record.customer_id = resolveCustomer(row, context, errors, warnings, options);
        record.product_id = resolveProduct(row, context, errors, warnings);
        record.opportunity_id = resolveById(row.opportunity_id, context.opportunities, "opportunity_id", warnings, "商机") || row.opportunity_id || "";
        record.quantity = numberValue(record.quantity, 0);
        record.unit_price = numberValue(record.unit_price, 0);
        record.currency = enumValue(record.currency, "currency", "CNY", warnings);
        record.quote_status = enumValue(record.quote_status, "quoteStatus", "Draft", warnings);
      }
      if (table === "orders") {
        record.customer_id = resolveCustomer(row, context, errors, warnings, options);
        record.product_id = resolveProduct(row, context, errors, warnings);
        record.opportunity_id = resolveById(row.opportunity_id, context.opportunities, "opportunity_id", warnings, "商机") || row.opportunity_id || "";
        record.quote_id = resolveById(row.quote_id, context.quotes, "quote_id", warnings, "报价") || row.quote_id || "";
        record.quantity = numberValue(record.quantity, 0);
        record.total_value = numberValue(record.total_value, 0);
        const margin = numberValue(record.gross_margin, 0);
        record.gross_margin = margin <= 1 && margin > 0 ? Math.round(margin * 1000) / 10 : margin;
        record.payment_status = enumValue(record.payment_status, "paymentStatus", "Unpaid", warnings);
        record.delivery_status = enumValue(record.delivery_status, "deliveryStatus", "Not Shipped", warnings);
        record.repeat_order_flag = boolValue(record.repeat_order_flag);
      }
      if (table === "interactions") {
        record.customer_id = resolveCustomer(row, context, errors, warnings, options);
        record.contact_id = resolveContact(row.contact_id, context, warnings) || record.contact_id || "";
        record.opportunity_id = resolveById(row.opportunity_id, context.opportunities, "opportunity_id", warnings, "商机") || row.opportunity_id || "";
        record.interaction_type = enumValue(record.interaction_type, "interactionType", "Other", warnings);
      }
      if (table === "customerFeedback") {
        record.customer_id = resolveCustomer(row, context, errors, warnings, options);
        if (!record.customer_id && row.customer_name) {
          record.pending_customer_name = row.customer_name;
          record.customer_name = row.customer_name;
          record.unknown_customer_mode = options.unknownCustomerMode || "need_review";
        }
        record.product_id = resolveProduct(row, context, errors, warnings);
        record.contact_id = resolveContact(row.contact_id, context, warnings) || record.contact_id || "";
        record.sample_id = resolveById(row.sample_id, context.samples, "sample_id", warnings, "样品") || row.sample_id || "";
        record.overall_liking = ratingValue(record.overall_liking, errors, warnings, "总体喜欢程度");
        record.purchase_intent = ratingValue(record.purchase_intent, errors, warnings, "购买意愿");
        record.liked_tags = standardizeTags(row.liked_tags, context.tags, warnings);
        const dislikedResult = standardizeDislikedTags(row.disliked_tags, context.tags, warnings);
        record.disliked_tags = dislikedResult.tags;
        if (dislikedResult.negativeText) record.negative_comment = dislikedResult.negativeText;
        if (dislikedResult.negativeText) record.comment = [record.comment, dislikedResult.negativeText].filter(Boolean).join("；");
        record.sweetness_feedback = sweetnessValue(row.sweetness_feedback, warnings);
        record.price_acceptance = priceAcceptanceValue(row.price_acceptance, warnings);
      }
      ["sent_date", "received_date", "feedback_due_date", "next_follow_up_date", "valid_until", "order_date", "interaction_date", "tasting_date", "created_at", "updated_at"].forEach(key => {
        if (record[key]) record[key] = normalizeDateValue(record[key]);
      });
      return record;
    }

    function mapFields(row, aliases = fieldAliases) {
      return Object.entries(row).reduce((acc, [header, value]) => {
        const key = canonicalFieldName(header, aliases);
        acc[key] = normalizeCellValue(value);
        return acc;
      }, {});
    }

    function canonicalizeRow(row) {
      return mapFields(row, fieldAliases);
    }

    function canonicalFieldName(header, aliases = fieldAliases) {
      const normalized = normalizeImportKey(header);
      for (const [key, keyAliases] of Object.entries(aliases)) {
        if (keyAliases.map(normalizeImportKey).includes(normalized)) return key;
      }
      return normalized.replace(/[^a-z0-9_]/g, "_").replace(/_+/g, "_").replace(/^_|_$/g, "");
    }

    function normalizeImportKey(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, "_").replace(/[\-\/（）()：:]/g, "_").replace(/_+/g, "_").replace(/^_|_$/g, "");
    }

    function normalizeCellValue(value) {
      if (value === null || value === undefined) return "";
      if (value instanceof Date) return iso(value);
      return String(value).trim();
    }

    function required(record, key, errors, message) {
      if (!cellText(record[key])) errors.push(message);
    }

    function cellText(value) {
      return value === undefined || value === null ? "" : String(value).trim();
    }

    function enumValue(value, enumKey, fallback, warnings) {
      const text = cellText(value);
      if (!text) return fallback;
      const options = enums[enumKey] || [];
      const exact = options.find(option => normalizeImportKey(option) === normalizeImportKey(text));
      if (exact) return exact;
      warnings.push(`${text} 未匹配标准枚举，已使用 ${fallback}`);
      return fallback;
    }

    function boolValue(value) {
      return ["true", "1", "yes", "y", "是", "复购", "主联系人"].includes(cellText(value).toLowerCase());
    }

    function numberValue(value, fallback = 0) {
      const text = cellText(value).replace(/,/g, "");
      if (!text) return fallback;
      const direct = Number(text);
      if (Number.isFinite(direct)) return direct;
      const match = text.match(/-?\d+(\.\d+)?/);
      return match ? Number(match[0]) : fallback;
    }

    function ratingValue(value, errors, warnings, label) {
      const text = cellText(value);
      if (!text) {
        errors.push(`${label} 缺少评分`);
        return "";
      }
      const numeric = numberValue(text, NaN);
      if (Number.isFinite(numeric) && numeric >= 1 && numeric <= 5) return Math.round(numeric);
      const key = Object.keys(ratingMap).find(alias => text.includes(alias));
      if (key) return ratingMap[key];
      const reviewKey = Object.keys(ratingReviewMap).find(alias => text.includes(alias));
      if (reviewKey) {
        warnings.push(`natural_language_rating: ${label} "${text}" 已映射为 ${ratingReviewMap[reviewKey]}，需要复核`);
        return ratingReviewMap[reviewKey];
      }
      errors.push(`${label} 无法转换为 1-5 分：${text}`);
      return "";
    }

    function sweetnessValue(value, warnings) {
      const text = cellText(value);
      if (!text) return "";
      const exact = enums.sweetnessFeedback.find(option => normalizeImportKey(option) === normalizeImportKey(text));
      if (exact) return exact;
      const key = Object.keys(sweetnessMap).find(alias => text.includes(alias));
      if (key) return sweetnessMap[key];
      warnings.push(`甜度反馈未识别：${text}`);
      return text;
    }

    function priceAcceptanceValue(value, warnings) {
      const text = cellText(value);
      if (!text) return "Acceptable";
      const exact = enums.priceAcceptance.find(option => normalizeImportKey(option) === normalizeImportKey(text));
      if (exact) return exact;
      const key = Object.keys(priceAcceptanceMap).find(alias => normalizeName(text).includes(normalizeName(alias)));
      if (key) return priceAcceptanceMap[key];
      warnings.push(`price_acceptance_nonstandard: ${text} 未匹配标准枚举，已使用 Acceptable`);
      return "Acceptable";
    }

    function standardizeTags(value, tags, warnings) {
      const rawText = cellText(value);
      if (!rawText) return [];
      const tagByCn = new Map(tags.map(tag => [normalizeImportKey(tag.tag_name_cn), tag]));
      const tagByEn = new Map(tags.map(tag => [normalizeImportKey(tag.tag_name_en), tag]));
      const aliasByKey = new Map(Object.entries(tagAliases).map(([alias, cn]) => [normalizeImportKey(alias), cn]));
      const pieces = asArray(rawText).flatMap(item => item.split(/[、，,;；|/]/)).map(item => item.trim()).filter(Boolean);
      const inferred = new Set();
      const addTag = text => {
        const key = normalizeImportKey(text);
        const aliasCn = aliasByKey.get(key);
        const tag = tagByCn.get(key) || tagByEn.get(key) || (aliasCn ? tagByCn.get(normalizeImportKey(aliasCn)) : null);
        if (tag) {
          inferred.add(tag.tag_id);
          return true;
        }
        for (const [aliasKey, cn] of aliasByKey.entries()) {
          if (normalizeImportKey(text).includes(aliasKey)) {
            const aliasTag = tagByCn.get(normalizeImportKey(cn));
            if (aliasTag) inferred.add(aliasTag.tag_id);
            return Boolean(aliasTag);
          }
        }
        return false;
      };
      pieces.forEach(piece => {
        if (!addTag(piece)) warnings.push(`liked_tags_unknown: 风味标签未识别：${piece}`);
      });
      if (!inferred.size) {
        Object.keys(tagAliases).forEach(alias => {
          if (rawText.includes(alias)) addTag(alias);
        });
      }
      return Array.from(inferred);
    }

    function standardizeDislikedTags(value, tags, warnings) {
      const rawText = cellText(value);
      if (!rawText) return { tags: [], negativeText: "" };
      const pieces = asArray(rawText).flatMap(item => item.split(/[、，,;；|/]/)).map(item => item.trim()).filter(Boolean);
      const matched = [];
      const unmatched = [];
      pieces.forEach(piece => {
        const before = matched.length;
        const tagIds = standardizeTags(piece, tags, []);
        tagIds.forEach(id => {
          if (!matched.includes(id)) matched.push(id);
        });
        if (matched.length === before) unmatched.push(piece);
      });
      if (unmatched.length) warnings.push(`non_flavor_negative_comment: 未知风味或非风味吐槽已放入 negative_comment：${unmatched.join("、")}`);
      return { tags: matched, negativeText: unmatched.join("；") };
    }

    function resolveCustomer(row, context, errors, warnings, options = {}) {
      const result = matchCustomer(row, context.customers);
      if (result.status === "matched") {
        if (result.warning) warnings.push(result.warning);
        return result.value;
      }
      if (result.status === "review") {
        warnings.push(result.warning);
        return result.value;
      }
      const name = cellText(row.customer_name);
      if (!name) {
        errors.push("缺 customer_name");
        return cellText(row.customer_id);
      }
      const mode = options.unknownCustomerMode || "need_review";
      if (mode === "create_as_potential") {
        warnings.push(`unknown_customer_create_as_potential: 客户不存在，确认后创建为 Potential Customer：${name}`);
        return "";
      }
      if (mode === "need_review") {
        warnings.push(`unknown_customer_need_review: 客户不存在：${name}`);
        return "";
      }
      errors.push(`客户不存在：${name}`);
      return cellText(row.customer_id);
    }

    function resolveProduct(row, context, errors, warnings) {
      const result = matchProduct(row, context.products);
      if (result.status === "matched") {
        if (result.warning) warnings.push(result.warning);
        return result.value;
      }
      if (result.status === "review") {
        warnings.push(result.warning);
        return result.value;
      }
      const productName = cellText(row.product_name || row.product_interest);
      if (productName) errors.push(`产品不存在：${productName}`);
      else errors.push("缺 product_name / product_id / sku");
      return cellText(row.product_id);
    }

    function resolveProductLoose(value, context, warnings) {
      const text = cellText(value);
      if (!text) return { status: "empty", value: "" };
      return matchProduct({ product_id: text, sku: text, product_name: text, product_interest: text }, context.products, warnings);
    }

    function matchCustomer(row, customers) {
      const id = cellText(row.customer_id);
      if (id && customers.some(customer => customer.customer_id === id)) return { status: "matched", value: id };
      const name = cellText(row.customer_name);
      if (!name) return { status: "missing", value: id };
      const exact = customers.find(customer => cellText(customer.customer_name) === name);
      if (exact) return { status: "matched", value: exact.customer_id };
      const normalized = customers.find(customer => normalizeName(customer.customer_name) === normalizeName(name));
      if (normalized) return { status: "matched", value: normalized.customer_id, warning: `客户 normalize 匹配：${name} -> ${normalized.customer_name}` };
      const fuzzy = bestFuzzy(name, customers, "customer_name");
      if (fuzzy.score >= 0.72) return { status: "review", value: fuzzy.row.customer_id, warning: `客户模糊匹配：${name} -> ${fuzzy.row.customer_name} (${Math.round(fuzzy.score * 100)}%)，需人工确认` };
      return { status: "missing", value: id };
    }

    function matchProduct(row, products) {
      const productId = cellText(row.product_id);
      if (productId && products.some(product => product.product_id === productId)) return { status: "matched", value: productId };
      const sku = cellText(row.sku);
      if (sku) {
        const bySku = products.find(product => normalizeName(product.sku) === normalizeName(sku));
        if (bySku) return { status: "matched", value: bySku.product_id };
      }
      const name = cellText(row.product_name || row.product_interest);
      if (name) {
        const exact = products.find(product => cellText(product.product_name) === name);
        if (exact) return { status: "matched", value: exact.product_id };
        const normalized = products.find(product => normalizeName(product.product_name) === normalizeName(name));
        if (normalized) return { status: "matched", value: normalized.product_id, warning: `产品 normalize 匹配：${name} -> ${normalized.product_name}` };
        const alias = products.find(product => productAliases(product).some(item => normalizeName(item) === normalizeName(name)));
        if (alias) return { status: "matched", value: alias.product_id, warning: `product_alias_match: 产品别名匹配：${name} -> ${alias.product_name}` };
        const fuzzy = bestFuzzy(name, products, "product_name");
        if (fuzzy.score >= 0.72) return { status: "review", value: fuzzy.row.product_id, warning: `fuzzy_product_match: 产品模糊匹配：${name} -> ${fuzzy.row.product_name} (${Math.round(fuzzy.score * 100)}%)，需人工确认` };
      }
      return { status: "missing", value: productId };
    }

    function productAliases(product) {
      const builtIn = {
        "海盐开心果巧克力": ["海盐开心果黑巧", "开心果黑巧", "海盐开心果", "Sea Salt Pistachio", "sea salt pistachio"],
        "海盐开心果黑巧": ["海盐开心果巧克力", "开心果黑巧", "海盐开心果", "Sea Salt Pistachio", "sea salt pistachio"],
        "100% 委内瑞拉黑巧": ["委内瑞拉黑巧", "100黑巧", "100%黑巧"],
        "白巧柚子": ["柚子白巧", "白巧柚子巧克力"],
        "61% 牛奶巧克力": ["61牛奶巧", "牛奶巧克力", "61% milk", "61 milk", "milk 61"],
        "树莓巧克力": ["树莓黑巧", "树莓巧", "Raspberry Dark", "raspberry dark"]
      };
      return [
        ...(builtIn[product.product_name] || []),
        ...asArray(product.product_alias || product.product_aliases || product.alias)
      ];
    }

    function resolveById(value, rows, key, warnings, label) {
      const id = cellText(value);
      if (!id) return "";
      if (rows.some(row => row[key] === id)) return id;
      warnings.push(`${label} ID 未在当前数据中找到：${id}`);
      return id;
    }

    function resolveContact(value, context, warnings) {
      return resolveById(value, context.contacts, "contact_id", warnings, "联系人");
    }

    function bestFuzzy(text, rows, key) {
      const scored = rows
        .filter(row => row[key])
        .map(row => ({ row, score: similarity(normalizeName(text), normalizeName(row[key])) }))
        .sort((a, b) => b.score - a.score);
      return scored[0] || { row: {}, score: 0 };
    }

    function normalizeName(value) {
      return String(value || "").toLowerCase().replace(/[\s\-_%（）()·.,，。/]/g, "");
    }

    function similarity(a, b) {
      if (!a || !b) return 0;
      if (a === b) return 1;
      if (a.includes(b) || b.includes(a)) return Math.min(a.length, b.length) / Math.max(a.length, b.length);
      const distance = levenshtein(a, b);
      return 1 - distance / Math.max(a.length, b.length);
    }

    function levenshtein(a, b) {
      const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
      for (let i = 0; i <= a.length; i += 1) dp[i][0] = i;
      for (let j = 0; j <= b.length; j += 1) dp[0][j] = j;
      for (let i = 1; i <= a.length; i += 1) {
        for (let j = 1; j <= b.length; j += 1) {
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
          );
        }
      }
      return dp[a.length][b.length];
    }

    function nextImportId(table, rowNumber) {
      const prefix = {
        customers: "CUS",
        contacts: "CON",
        products: "PRO",
        samples: "SAM",
        opportunities: "OPP",
        quotes: "QUO",
        orders: "ORD",
        interactions: "INT",
        customerFeedback: "FDB"
      }[table] || "IMP";
      return `${prefix}-IMP-${String(rowNumber).padStart(4, "0")}`;
    }

    function normalizeDateValue(value) {
      const text = cellText(value);
      if (!text) return "";
      const serial = Number(text);
      if (Number.isFinite(serial) && serial > 20000 && serial < 80000) {
        const date = new Date(Date.UTC(1899, 11, 30 + serial));
        return date.toISOString().slice(0, 10);
      }
      const date = new Date(text);
      if (!Number.isNaN(date.getTime())) return date.toISOString().slice(0, 10);
      return text;
    }

    async function parseXlsxFile(arrayBuffer) {
      const entries = await readZipEntries(arrayBuffer);
      const workbookXml = await zipText(entries, "xl/workbook.xml");
      const relsXml = await zipText(entries, "xl/_rels/workbook.xml.rels");
      const sharedStrings = entries.has("xl/sharedStrings.xml") ? parseSharedStrings(await zipText(entries, "xl/sharedStrings.xml")) : [];
      const workbook = parseXml(workbookXml);
      const rels = parseXml(relsXml);
      const relMap = {};
      Array.from(rels.getElementsByTagName("Relationship")).forEach(rel => {
        relMap[rel.getAttribute("Id")] = rel.getAttribute("Target");
      });
      const sheets = [];
      for (const sheet of Array.from(workbook.getElementsByTagName("sheet"))) {
        const name = sheet.getAttribute("name");
        const relId = sheet.getAttribute("r:id") || sheet.getAttribute("id");
        const target = relMap[relId];
        if (!target) continue;
        const path = normalizeZipPath(target.startsWith("/") ? target.slice(1) : `xl/${target}`);
        if (!entries.has(path)) continue;
        sheets.push({ sheetName: name, rows: await parseWorksheetXml(entries, path, sharedStrings) });
      }
      return sheets;
    }

    async function readZipEntries(arrayBuffer) {
      const view = new DataView(arrayBuffer);
      let eocd = -1;
      for (let i = view.byteLength - 22; i >= Math.max(0, view.byteLength - 70000); i -= 1) {
        if (view.getUint32(i, true) === 0x06054b50) {
          eocd = i;
          break;
        }
      }
      if (eocd < 0) throw new Error("无法读取 XLSX ZIP 目录");
      const total = view.getUint16(eocd + 10, true);
      let offset = view.getUint32(eocd + 16, true);
      const entries = new Map();
      for (let i = 0; i < total; i += 1) {
        if (view.getUint32(offset, true) !== 0x02014b50) throw new Error("XLSX ZIP 目录损坏");
        const method = view.getUint16(offset + 10, true);
        const compressedSize = view.getUint32(offset + 20, true);
        const fileNameLength = view.getUint16(offset + 28, true);
        const extraLength = view.getUint16(offset + 30, true);
        const commentLength = view.getUint16(offset + 32, true);
        const localOffset = view.getUint32(offset + 42, true);
        const nameBytes = new Uint8Array(arrayBuffer, offset + 46, fileNameLength);
        const name = normalizeZipPath(new TextDecoder().decode(nameBytes));
        const localNameLength = view.getUint16(localOffset + 26, true);
        const localExtraLength = view.getUint16(localOffset + 28, true);
        const dataStart = localOffset + 30 + localNameLength + localExtraLength;
        const data = new Uint8Array(arrayBuffer, dataStart, compressedSize);
        entries.set(name, { method, data });
        offset += 46 + fileNameLength + extraLength + commentLength;
      }
      return entries;
    }

    async function zipText(entries, path) {
      const entry = entries.get(normalizeZipPath(path));
      if (!entry) throw new Error(`XLSX 缺少 ${path}`);
      let bytes;
      if (entry.method === 0) {
        bytes = entry.data;
      } else if (entry.method === 8) {
        if (!("DecompressionStream" in window)) throw new Error("当前浏览器不支持本地 XLSX 解压，请改用 CSV");
        try {
          const stream = new Blob([entry.data]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
          bytes = new Uint8Array(await new Response(stream).arrayBuffer());
        } catch {
          const stream = new Blob([entry.data]).stream().pipeThrough(new DecompressionStream("deflate"));
          bytes = new Uint8Array(await new Response(stream).arrayBuffer());
        }
      } else {
        throw new Error(`不支持的 XLSX 压缩方式：${entry.method}`);
      }
      return new TextDecoder("utf-8").decode(bytes);
    }

    function normalizeZipPath(path) {
      const parts = [];
      path.replace(/\\/g, "/").split("/").forEach(part => {
        if (!part || part === ".") return;
        if (part === "..") parts.pop();
        else parts.push(part);
      });
      return parts.join("/");
    }

    function parseXml(text) {
      const xml = new DOMParser().parseFromString(text, "application/xml");
      if (xml.getElementsByTagName("parsererror").length) throw new Error("XLSX XML 解析失败");
      return xml;
    }

    function parseSharedStrings(text) {
      const xml = parseXml(text);
      return Array.from(xml.getElementsByTagName("si")).map(si => Array.from(si.getElementsByTagName("t")).map(t => t.textContent || "").join(""));
    }

    async function parseWorksheetXml(entries, path, sharedStrings) {
      const xml = parseXml(await zipText(entries, path));
      const matrix = [];
      Array.from(xml.getElementsByTagName("row")).forEach(row => {
        const rowIndex = Number(row.getAttribute("r") || matrix.length + 1) - 1;
        matrix[rowIndex] = matrix[rowIndex] || [];
        Array.from(row.getElementsByTagName("c")).forEach(cell => {
          const ref = cell.getAttribute("r") || "";
          const col = columnIndex(ref.replace(/\d+/g, ""));
          const type = cell.getAttribute("t");
          const v = cell.getElementsByTagName("v")[0];
          const inline = Array.from(cell.getElementsByTagName("t")).map(t => t.textContent || "").join("");
          let value = v ? v.textContent || "" : inline;
          if (type === "s") value = sharedStrings[Number(value)] || "";
          if (type === "b") value = value === "1" ? "TRUE" : "FALSE";
          matrix[rowIndex][col] = value;
        });
      });
      return matrixToObjects(matrix);
    }

    function columnIndex(letters) {
      return String(letters || "A").split("").reduce((sum, char) => sum * 26 + char.charCodeAt(0) - 64, 0) - 1;
    }

    function matrixToObjects(matrix) {
      const headerIndex = matrix.findIndex(row => (row || []).filter(cell => cell !== undefined && cell !== "").length >= 2);
      if (headerIndex < 0) return [];
      const headers = (matrix[headerIndex] || []).map((header, index) => cellText(header) || `Column_${index + 1}`);
      return matrix.slice(headerIndex + 1)
        .filter(row => row && row.some(cell => cell !== undefined && cell !== ""))
        .map(row => headers.reduce((record, header, index) => {
          record[header] = normalizeCellValue(row[index]);
          return record;
        }, {}));
    }

    function importCustomersCsv() {
      const input = document.getElementById("customerCsvFile");
      const file = input.files && input.files[0];
      if (!file) {
        toast("请选择 customers.csv");
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        const rows = parseCsv(String(reader.result || ""));
        const required = ["customer_name", "customer_type", "country", "city", "customer_level", "status", "owner"];
        const validRows = rows.filter(row => required.every(key => row[key]));
        const newRows = validRows.map(row => baseRecord({
          customer_id: nextIdWithOffset("customers", state.customers.length + 1),
          customer_name: row.customer_name,
          customer_type: row.customer_type,
          country: row.country,
          city: row.city,
          source_channel: row.source_channel || "CSV Import",
          customer_level: row.customer_level,
          status: row.status,
          owner: row.owner,
          notes: row.notes || ""
        }));
        state.customers.push(...newRows);
        saveState(state);
        renderNav();
        render();
        toast(`已导入 ${newRows.length} 个客户`);
      };
      reader.readAsText(file, "utf-8");
    }

    function nextIdWithOffset(table, offset) {
      const prefix = { customers: "CUS" }[table] || "REC";
      const nums = state[table].map(row => Number(String(row[tableMeta[table].id] || "").split("-").pop())).filter(Number.isFinite);
      return makeId(prefix, Math.max(offset, (nums.length ? Math.max(...nums) : 0) + 1));
    }

    function parseCsvWithMeta(text) {
      const lines = text.replace(/^\uFEFF/, "").split(/\r?\n/).filter(Boolean);
      if (!lines.length) return { headers: [], rows: [] };
      const headers = splitCsvLine(lines[0]).map(h => h.trim());
      const rows = lines.slice(1).map(line => {
        const cells = splitCsvLine(line);
        return headers.reduce((row, header, index) => {
          row[header] = cells[index] || "";
          return row;
        }, {});
      }).filter(row => Object.values(row).some(value => String(value || "").trim()));
      return { headers, rows };
    }

    function parseCsv(text) {
      return parseCsvWithMeta(text).rows;
    }

    function splitCsvLine(line) {
      const cells = [];
      let current = "";
      let quoted = false;
      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        if (char === '"' && line[i + 1] === '"') {
          current += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          cells.push(current);
          current = "";
        } else {
          current += char;
        }
      }
      cells.push(current);
      return cells;
    }

    init();
  </script>
</body>
